<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>קפאסה — מערכת לימוד</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:rgba(255,255,255,0.07);--text:#f0efe8;--muted:rgba(240,239,232,0.45);--c0:#d4a843;--c0b:rgba(212,168,67,0.12);--c1:#7c6fcd;--c1b:rgba(124,111,205,0.12);--c2:#c05b6a;--c2b:rgba(192,91,106,0.12);--correct:#3cbe8a;--wrong:#e05c6a;--radius:18px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.app{max-width:480px;margin:0 auto;padding:0 0 120px;position:relative;z-index:1}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px}
.loading-logo{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;letter-spacing:.25em;color:var(--c0);margin-bottom:12px}
.loading-spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--c0);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{font-size:13px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.header{padding:56px 24px 28px;position:relative;overflow:hidden}
.header-glow{position:absolute;top:-40px;right:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(212,168,67,.15) 0%,transparent 70%);pointer-events:none}
.header-logo{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--c0);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.header-logo::before{content:'';display:inline-block;width:20px;height:1px;background:var(--c0)}
.header h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;line-height:1.1;letter-spacing:-.02em}
.header h1 em{font-style:italic;color:var(--c0)}
.header-sub{font-size:14px;color:var(--muted);margin-top:8px;font-weight:300}
.cat-section{padding:0 16px 20px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cat-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 8px;cursor:pointer;text-align:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.cat-btn::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.cat-btn.c0::after{background:radial-gradient(circle at 50% 0%,rgba(212,168,67,.2),transparent 70%)}
.cat-btn.c1::after{background:radial-gradient(circle at 50% 0%,rgba(124,111,205,.2),transparent 70%)}
.cat-btn.c2::after{background:radial-gradient(circle at 50% 0%,rgba(192,91,106,.2),transparent 70%)}
.cat-btn.active::after{opacity:1}
.cat-btn.active.c0{border-color:var(--c0);box-shadow:0 0 24px rgba(212,168,67,.15)}
.cat-btn.active.c1{border-color:var(--c1);box-shadow:0 0 24px rgba(124,111,205,.15)}
.cat-btn.active.c2{border-color:var(--c2);box-shadow:0 0 24px rgba(192,91,106,.15)}
.cat-btn:active{transform:scale(.96)}
.cat-icon{font-size:24px;margin-bottom:6px;display:block}
.cat-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.03em}
.cat-btn.active .cat-label{color:var(--text)}
.cat-count{font-size:10px;margin-top:3px;font-weight:700}
.cat-btn.c0 .cat-count{color:var(--c0)}
.cat-btn.c1 .cat-count{color:var(--c1)}
.cat-btn.c2 .cat-count{color:var(--c2)}
.sub-section{padding:0 16px 20px}
.sub-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sub-scroll::-webkit-scrollbar{display:none}
.sub-btn{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:8px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;font-family:'Heebo',sans-serif}
.sub-btn.active.s0{background:var(--c0b);border-color:var(--c0);color:var(--c0)}
.sub-btn.active.s1{background:var(--c1b);border-color:var(--c1);color:var(--c1)}
.sub-btn.active.s2{background:var(--c2b);border-color:var(--c2);color:var(--c2)}
.mode-section{padding:0 16px 24px}
.mode-toggle{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);border-radius:var(--radius);padding:4px;border:1px solid var(--border)}
.mode-btn{padding:12px;border-radius:calc(var(--radius) - 4px);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all .25s;background:transparent;border:none;font-family:'Heebo',sans-serif}
.mode-btn.active{background:var(--surface2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.content{padding:0 16px}
.fc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.fc-progress{display:flex;align-items:center;gap:10px}
.fc-num{font-size:13px;color:var(--muted)}
.fc-bar{width:80px;height:3px;background:var(--border);border-radius:100px;overflow:hidden}
.fc-bar-fill{height:100%;border-radius:100px;transition:width .4s ease}
.fc-bar-fill.c0{background:var(--c0)}
.fc-bar-fill.c1{background:var(--c1)}
.fc-bar-fill.c2{background:var(--c2)}
.fc-shuffle{background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Heebo',sans-serif}
.flashcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-height:280px;padding:28px 24px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s;display:flex;flex-direction:column;justify-content:space-between}
.flashcard:active{transform:scale(.98)}
.fc-stripe{position:absolute;top:0;right:0;width:4px;height:100%}
.fc-stripe.c0{background:var(--c0)}
.fc-stripe.c1{background:var(--c1)}
.fc-stripe.c2{background:var(--c2)}
.fc-corner-glow{position:absolute;top:-30px;left:-30px;width:120px;height:120px;border-radius:50%;opacity:.06;pointer-events:none}
.fc-corner-glow.c0{background:var(--c0)}
.fc-corner-glow.c1{background:var(--c1)}
.fc-corner-glow.c2{background:var(--c2)}
.fc-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:100px;margin-bottom:16px;align-self:flex-start}
.fc-badge.c0{background:var(--c0b);color:var(--c0)}
.fc-badge.c1{background:var(--c1b);color:var(--c1)}
.fc-badge.c2{background:var(--c2b);color:var(--c2)}
.fc-question{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.4;flex:1;display:flex;align-items:center}
.fc-answer{font-size:14px;line-height:1.8;color:var(--muted);margin-top:20px;padding-top:20px;border-top:1px solid var(--border);white-space:pre-line;display:none;animation:fadeUp .3s ease}
.flashcard.revealed .fc-answer{display:block}
.fc-hint{font-size:11px;color:rgba(255,255,255,.2);text-align:center;margin-top:20px}
.flashcard.revealed .fc-hint{display:none}
.fc-nav{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;margin-top:14px;align-items:center}
.fc-nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:18px;color:var(--text);cursor:pointer;transition:all .2s;font-family:'Heebo',sans-serif}
.fc-nav-btn:disabled{opacity:.2;cursor:default}
.fc-nav-btn:not(:disabled):active{transform:scale(.94);background:var(--surface2)}
.fc-nav-center{font-size:13px;color:var(--muted);text-align:center}
.quiz-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;display:flex;justify-content:space-between;margin-bottom:16px}
.quiz-stat{font-size:12px;color:var(--muted)}
.quiz-stat span{font-size:15px;font-weight:700;color:var(--text);margin-left:4px}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:14px}
.qz-num{font-size:11px;color:var(--muted);margin-bottom:6px}
.qz-badge{display:inline-flex;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:100px;margin-bottom:14px}
.qz-badge.c0{background:var(--c0b);color:var(--c0)}
.qz-badge.c1{background:var(--c1b);color:var(--c1)}
.qz-badge.c2{background:var(--c2b);color:var(--c2)}
.qz-question{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;line-height:1.4;margin-bottom:20px}
.open-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:14px;font-family:'Heebo',sans-serif;color:var(--text);resize:none;min-height:80px;margin-bottom:12px;direction:rtl;outline:none;transition:border-color .2s}
.open-textarea:focus{border-color:rgba(255,255,255,.2)}
.reveal-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 18px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Heebo',sans-serif}
.answer-reveal{margin-top:14px;padding:16px;border-radius:var(--radius-sm);font-size:14px;line-height:1.8;display:none;white-space:pre-line}
.answer-reveal.shown{display:block;animation:fadeUp .3s ease}
.answer-reveal.c0{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);color:#e8c97a}
.answer-reveal.c1{background:rgba(124,111,205,.08);border:1px solid rgba(124,111,205,.2);color:#b0a8e8}
.answer-reveal.c2{background:rgba(192,91,106,.08);border:1px solid rgba(192,91,106,.2);color:#e8a0aa}
.next-btn{width:100%;padding:16px;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'Heebo',sans-serif;cursor:pointer;border:none;transition:all .2s}
.next-btn.c0{background:var(--c0);color:#0a0a0f}
.next-btn.c1{background:var(--c1);color:#fff}
.next-btn.c2{background:var(--c2);color:#fff}
.next-btn:active{transform:scale(.98);opacity:.9}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:48px 28px;text-align:center;position:relative;overflow:hidden}
.result-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;opacity:.08;pointer-events:none}
.result-glow.c0{background:var(--c0)}
.result-glow.c1{background:var(--c1)}
.result-glow.c2{background:var(--c2)}
.result-score{font-family:'Playfair Display',serif;font-size:72px;font-weight:900;line-height:1;margin-bottom:8px}
.result-score.c0{color:var(--c0)}
.result-score.c1{color:var(--c1)}
.result-score.c2{color:var(--c2)}
.result-label{font-size:13px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px}
.result-msg{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:8px;font-style:italic}
.result-sub{font-size:14px;color:var(--muted);margin-bottom:36px}
.restart-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 40px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;font-family:'Heebo',sans-serif}
.error-card{background:var(--surface);border:1px solid rgba(224,92,106,.3);border-radius:var(--radius);padding:32px 24px;text-align:center;margin:20px 16px}
.error-card h3{font-size:18px;color:var(--wrong);margin-bottom:10px;font-family:'Playfair Display',serif}
.error-card p{font-size:14px;color:var(--muted);line-height:1.6}
.retry-btn{margin-top:20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;color:var(--text);cursor:pointer;font-family:'Heebo',sans-serif}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="loading-logo">KEPASA</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">טוענת חומר לימוד...</div>
  </div>
</div>
<script>
const API='https://script.google.com/macros/s/AKfycbykex0tKfAtMEuoZQG7izT9ZqiyeABSfdO8W4Mf3-PeFh2waEfoeLIKYcXNTtoYlzdgQA/exec';
const CAT_NAMES=['תפריט אוכל','עולם האלכוהול','שייקים וקוקטיילים'];
const CAT_ICONS=['🍽️','🥃','🍹'];
const CAT_LABELS=['תפריט אוכל','אלכוהול','שייקים'];
let allData=[],cat=0,sub='הכל',mode='flash',cards=[],ci=0,qItems=[],qi=0,score=0,answered=[],done=false;
function getFiltered(){let d=allData.filter(r=>r.cat===CAT_NAMES[cat]);return sub==='הכל'?d:d.filter(r=>r.sub===sub);}
function getSubs(){const s=CAT_NAMES[cat];const u=[...new Set(allData.filter(r=>r.cat===s).map(r=>r.sub).filter(Boolean))];return['הכל',...u];}
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function reset(){ci=0;qi=0;score=0;answered=[];done=false;const d=getFiltered();cards=shuffle(d);qItems=shuffle(d);}
function setCat(c){cat=c;sub='הכל';reset();renderApp();}
function setSub(s){sub=s;reset();renderApp();}
function setMode(m){mode=m;reset();renderApp();}
function catCount(i){return allData.filter(r=>r.cat===CAT_NAMES[i]).length;}
function fmt(a){return(a||'').replace(/\|/g,'\n');}
function renderApp(){
  const subs=getSubs();
  document.getElementById('root').innerHTML=`<div class="app">
    <div class="header"><div class="header-glow"></div><div class="header-logo">KEPASA</div><h1>מערכת <em>לימוד</em></h1><p class="header-sub">100% ברמנים • בחרי קטגוריה והתחילי</p></div>
    <div class="cat-section"><div class="cat-grid">${CAT_LABELS.map((l,i)=>`<button class="cat-btn c${i} ${cat===i?'active':''}" onclick="setCat(${i})"><span class="cat-icon">${CAT_ICONS[i]}</span><div class="cat-label">${l}</div><div class="cat-count">${catCount(i)} כרטיסיות</div></button>`).join('')}</div></div>
    <div class="sub-section"><div class="sub-scroll">${subs.map(s=>`<button class="sub-btn s${cat} ${s===sub?'active':''}" onclick="setSub(decodeURIComponent('${encodeURIComponent(s)}')">${s}</button>`).join('')}</div></div>
    <div class="mode-section"><div class="mode-toggle"><button class="mode-btn ${mode==='flash'?'active':''}" onclick="setMode('flash')">✦ כרטיסיות זיכרון</button><button class="mode-btn ${mode==='quiz'?'active':''}" onclick="setMode('quiz')">◎ קוויז</button></div></div>
    <div class="content" id="content"></div>
  </div>`;
  renderContent();
}
function renderContent(){const el=document.getElementById('content');if(!el)return;mode==='flash'?renderFlash(el):renderQuiz(el);}
function renderFlash(el){
  if(!cards.length){el.innerHTML='<div class="empty">אין כרטיסיות בתת-קטגוריה זו</div>';return;}
  const c=cards[ci],pct=Math.round((ci/(cards.length-1||1))*100),ans=fmt(c.answer);
  el.innerHTML=`<div class="fc-meta"><div class="fc-progress"><span class="fc-num">${ci+1}/${cards.length}</span><div class="fc-bar"><div class="fc-bar-fill c${cat}" style="width:${pct}%"></div></div></div><button class="fc-shuffle" onclick="cards=shuffle(getFiltered());ci=0;renderContent()">ערבוב</button></div>
  <div class="flashcard" id="fc" onclick="document.getElementById('fc').classList.toggle('revealed')">
    <div class="fc-stripe c${cat}"></div><div class="fc-corner-glow c${cat}"></div>
    <div><div class="fc-badge c${cat}">${c.sub||''}</div><div class="fc-question">${c.question||''}</div></div>
    <div class="fc-answer">${ans}</div><div class="fc-hint">לחצי לגילוי התשובה</div>
  </div>
  <div class="fc-nav">
    <button class="fc-nav-btn" onclick="ci--;renderContent()" ${ci===0?'disabled':''}>→</button>
    <div class="fc-nav-center">${ci+1} מתוך ${cards.length}</div>
    <button class="fc-nav-btn" onclick="ci++;renderContent()" ${ci===cards.length-1?'disabled':''}>←</button>
  </div>`;
}
function renderQuiz(el){
  if(!qItems.length){el.innerHTML='<div class="empty">אין שאלות בתת-קטגוריה זו</div>';return;}
  if(done){
    const pct=Math.round(score/qItems.length*100);
    el.innerHTML=`<div class="result-card"><div class="result-glow c${cat}"></div><div class="result-score c${cat}">${score}<span style="font-size:32px">/${qItems.length}</span></div><div class="result-label">ניקוד סופי</div><div class="result-msg">${pct>=90?'מדהים! כמו ברמן אמיתי':pct>=70?'טוב מאוד, עוד קצת!':'המשיכי להתאמן!'}</div><div class="result-sub">${pct}% נכון</div><button class="restart-btn" onclick="reset();renderContent()">התחלה מחדש</button></div>`;
    return;
  }
  const q=qItems[qi],isAns=answered[qi]!==undefined,ans=fmt(q.answer);
  el.innerHTML=`<div class="quiz-header"><div class="quiz-stat">ניקוד<span>${score}/${qItems.length}</span></div><div class="quiz-stat">שאלה<span>${qi+1}/${qItems.length}</span></div></div>
  <div class="quiz-card">
    <div class="qz-num">שאלה ${qi+1} מתוך ${qItems.length}</div>
    <div class="qz-badge c${cat}">${q.sub||''}</div>
    <div class="qz-question">${q.question||''}</div>
    <textarea class="open-textarea" placeholder="כתבי את תשובתך..."></textarea>
    ${!isAns?`<button class="reveal-btn" onclick="answered[${qi}]=true;renderContent()">הצגת תשובה</button>`:''}
    <div class="answer-reveal c${cat}${isAns?' shown':''}">✓ ${ans}</div>
  </div>
  ${isAns?`<button class="next-btn c${cat}" onclick="nextQ()">${qi<qItems.length-1?'הבאה ←':'סיום וראיית תוצאות'}</button>`:''}`;
}
function nextQ(){if(answered[qi])score++;qi++;if(qi>=qItems.length)done=true;renderContent();}
function showError(msg){document.getElementById('root').innerHTML=`<div class="app"><div class="header"><div class="header-logo">KEPASA</div><h1>מערכת <em>לימוד</em></h1></div><div class="error-card"><h3>שגיאה בטעינה</h3><p>${msg}</p><button class="retry-btn" onclick="loadData()">נסי שוב</button></div></div>`;}
async function loadData(){
  document.getElementById('root').innerHTML=`<div class="loading-screen"><div class="loading-logo">KEPASA</div><div class="loading-spinner"></div><div class="loading-text">טוענת חומר לימוד...</div></div>`;
  try{
    const res=await fetch(API);
    if(!res.ok)throw new Error('שגיאת רשת');
    const data=await res.json();
    if(!Array.isArray(data)||!data.length)throw new Error('הגיליון ריק');
    allData=data.filter(r=>r.cat&&r.question&&r.answer);
    if(!allData.length)throw new Error('לא נמצאו נתונים תקינים');
    reset();renderApp();
  }catch(e){showError('לא הצלחתי לטעון. בדקי שה-Apps Script פורס כראוי. '+e.message);}
}
loadData();
</script>
</body>
</html>
